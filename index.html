<script>
let display = document.getElementById("display");

function press(val) {
  if (display.innerText === "0") display.innerText = val;
  else display.innerText += val;
}

function clearDisplay() {
  display.innerText = "0";
}

function calculate() {
  try {
    display.innerText = eval(display.innerText);
  } catch {
    display.innerText = "Error";
  }

  playSongAndLyrics();
}

/* 🎶 PLAY + ANIMATE LYRICS */
function playSongAndLyrics() {
  let song = document.getElementById("song");

  // fix autoplay issues
  song.pause();
  song.currentTime = 0;
  song.play().catch(() => {
    console.log("User interaction required for audio");
  });

  let lyrics = [
    "ex ng other cousin ko",

  ];

  let box = document.getElementById("lyricsBox");
  box.innerHTML = "";

  lyrics.forEach((line, index) => {
    let div = document.createElement("div");
    div.className = "lyric-line glow";
    box.appendChild(div);

    setTimeout(() => {
      typeWriter(div, line);
    }, index * 1500);
  });
}

/* ✍️ TYPEWRITER EFFECT */
function typeWriter(element, text) {
  let i = 0;
  let speed = 35;

  function typing() {
    if (i < text.length) {
      element.innerText += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}
</script>
