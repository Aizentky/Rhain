<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Calculator Music</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg, #000, #111);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
}

/* Calculator container */
.calculator {
  width: 100%;
  max-width: 360px;
  height: 100vh;
  max-height: 700px;
  background: #000;
  border-radius: 30px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

/* Display */
.display {
  font-size: 48px;
  text-align: right;
  padding: 20px 10px;
  overflow-x: auto;
}

/* Buttons grid */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

/* Button style */
button {
  height: 70px;
  border: none;
  border-radius: 50%;
  font-size: 22px;
  cursor: pointer;
  transition: 0.15s;
}

button:active {
  transform: scale(0.9);
  filter: brightness(1.2);
}

/* Colors */
.gray { background: #a5a5a5; color: black; }
.dark { background: #333; color: white; }
.orange { background: #ff9500; color: white; }

.zero {
  grid-column: span 2;
  border-radius: 40px;
}

/* Lyrics overlay */
#lyricsBox {
  position: fixed;
  bottom: 120px;
  width: 100%;
  text-align: center;
  pointer-events: none;
}

.lyric-line {
  opacity: 0;
  font-size: 18px;
  margin: 6px 0;
  animation: fadeIn 0.8s forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(-10px);
  }
}

.glow {
  text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
}
</style>
</head>

<body>

<div class="calculator">
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button class="gray" onclick="clearDisplay()">C</button>
    <button class="gray" onclick="press('%')">%</button>
    <button class="gray" onclick="press('/')">÷</button>
    <button class="orange" onclick="press('*')">×</button>

    <button class="dark" onclick="press('7')">7</button>
    <button class="dark" onclick="press('8')">8</button>
    <button class="dark" onclick="press('9')">9</button>
    <button class="orange" onclick="press('-')">−</button>

    <button class="dark" onclick="press('4')">4</button>
    <button class="dark" onclick="press('5')">5</button>
    <button class="dark" onclick="press('6')">6</button>
    <button class="orange" onclick="press('+')">+</button>

    <button class="dark" onclick="press('1')">1</button>
    <button class="dark" onclick="press('2')">2</button>
    <button class="dark" onclick="press('3')">3</button>
    <button class="orange" onclick="calculate()">=</button>

    <button class="dark zero" onclick="press('0')">0</button>
    <button class="dark" onclick="press('.')">.</button>
  </div>
</div>

<!-- 🎵 AUDIO -->
<audio id="song" preload="auto">
  <source src="https://raw.githubusercontent.com/Aizentky/angelicav2/main/kalapastanganAudio.mp4" type="audio/mp4">
</audio>

<!-- 🎤 LYRICS -->
<div id="lyricsBox"></div>

<script>
let display = document.getElementById("display");

function press(val) {
  if (display.innerText === "0") display.innerText = val;
  else display.innerText += val;
}

function clearDisplay() {
  display.innerText = "0";
}

function calculate() {
  try {
    display.innerText = eval(display.innerText);
  } catch {
    display.innerText = "Error";
  }

  playSongAndLyrics();
}

/* 🎶 PLAY + ANIMATE LYRICS */
function playSongAndLyrics() {
  let song = document.getElementById("song");
  song.currentTime = 0;
  song.play();

  let lyrics = [
    "tangina ano bang wala sakin na meron sa bbf mo",
    "dapat makiramdam kadin tanginamo scarlette",
    "bakit nilayuan ko naman nungg nagselos ka ah",
    "pero bat sakin di mo magawa alam kong bbf mo yun",
    "pero know your boundaries naman..",
    "sana karmahin kayo.",

  ];

  let box = document.getElementById("lyricsBox");
  box.innerHTML = "";

  lyrics.forEach((line, index) => {
    let div = document.createElement("div");
    div.className = "lyric-line glow";
    box.appendChild(div);

    setTimeout(() => {
      typeWriter(div, line);
    }, index * 1500);
  });
}

/* ✍️ TYPEWRITER EFFECT */
function typeWriter(element, text) {
  let i = 0;
  let speed = 25;

  function typing() {
    if (i < text.length) {
      element.innerText += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}
</script>

</body>
</html>
